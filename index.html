<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shusan Gautam</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#111;
color:white;
font-family:Arial,sans-serif;
}

.hero{

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

text-align:center;

}

.hero img{

width:180px;

height:180px;

border-radius:50%;

object-fit:cover;

border:4px solid white;

}

.btn-custom{

margin:10px;

padding:12px 30px;

border-radius:50px;

}

section{

padding:80px 20px;

}

.gallery img{

width:100%;

border-radius:15px;

transition:.3s;

}

.gallery img:hover{

transform:scale(1.03);

}

footer{

padding:30px;

text-align:center;

background:#000;

}

</style>

</head>

<body>

<div class="hero">

<img src="assets/profile.jpg" alt="Shusan Gautam">

<h1 class="mt-4">Shusan Gautam</h1>

<p>Portfolio • Travel • Wedding • Family Memories</p>

<a href="#gallery" class="btn btn-light btn-custom">View Gallery</a>

</div>

<section id="gallery">

<div class="container">

<h2 class="text-center mb-5">Gallery</h2>

<div class="row gallery">

<div class="col-md-4 mb-4">

<img src="https://via.placeholder.com/600x400">

<h4 class="text-center mt-3">Wedding</h4>

</div>

<div class="col-md-4 mb-4">

<img src="https://via.placeholder.com/600x400">

<h4 class="text-center mt-3">Travel</h4>

</div>

<div class="col-md-4 mb-4">

<img src="https://via.placeholder.com/600x400">

<h4 class="text-center mt-3">Family</h4>

</div>

</div>

</div>

</section>

<footer>

© 2026 Shusan Gautam

</footer>

</body>

</html>
